<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة المزرعة الذكي</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sidebar">
  <h2>🚜 إدارة المزرعة</h2>
  <button onclick="showSection('animals')">🐄 الحيوانات</button>
  <button onclick="showSection('workers')">👨‍🌾 العمال</button>
  <button onclick="showSection('feeds')">🌾 الأعلاف</button>
  <button onclick="showSection('visits')">🩺 الزيارات البيطرية</button>
</div>

<div class="main">
  <section id="animals" class="section active">
    <h2>إدارة الحيوانات</h2>
    <div class="input-container card">
        <input id="a_type" placeholder="النوع">
        <input id="a_age" placeholder="العمر">
        <input id="a_health" placeholder="الحالة الصحية">
        <input id="a_code" placeholder="الرقم التعريفي (10 أرقام)">
        <button onclick="addAnimal()">➕ إضافة</button>
    </div>
    <div class="table-controls card">
        <input type="text" id="searchAnimal" placeholder="🔍 ابحث بالنوع أو الكود..." oninput="searchTable('animals')">
        <button class="export-btn" onclick="exportToExcel('animalsTable', 'حيوانات_المزرعة')">📥 تصدير Excel</button>
    </div>
    <table id="animalsTable"></table>
  </section>

  <section id="workers" class="section">
    <h2>إدارة العمال</h2>
    <div class="input-container card">
        <input id="w_name" placeholder="الاسم">
        <input id="w_job" placeholder="الوظيفة">
        <input id="w_phone" placeholder="الهاتف">
        <button onclick="addWorker()">➕ إضافة</button>
    </div>
    <div class="table-controls card">
        <input type="text" id="searchWorker" placeholder="🔍 ابحث بالاسم..." oninput="searchTable('workers')">
        <button class="export-btn" onclick="exportToExcel('workersTable', 'عمال_المزرعة')">📥 تصدير Excel</button>
    </div>
    <table id="workersTable"></table>
  </section>

  <section id="feeds" class="section">
    <h2>الأعلاف</h2>
    <div class="input-container card">
        <input id="f_name" placeholder="اسم العلف">
        <input id="f_qty" placeholder="الكمية">
        <button onclick="addFeed()">➕ إضافة</button>
    </div>
    <div class="table-controls card">
        <input type="text" id="searchFeed" placeholder="🔍 ابحث بالعلف..." oninput="searchTable('feeds')">
        <button class="export-btn" onclick="exportToExcel('feedsTable', 'أعلاف_المزرعة')">📥 تصدير Excel</button>
    </div>
    <table id="feedsTable"></table>
  </section>

  <section id="visits" class="section">
    <h2>الزيارات البيطرية</h2>
    <div class="input-container card">
        <input id="v_vet" placeholder="اسم الطبيب">
        <input id="v_animal" placeholder="رقم الحيوان">
        <input id="v_date" type="date">
        <input id="v_diag" placeholder="التشخيص">
        <button onclick="addVisit()">➕ إضافة</button>
    </div>
    <div class="table-controls card">
        <input type="text" id="searchVisit" placeholder="🔍 ابحث بالطبيب أو التشخيص..." oninput="searchTable('visits')">
        <button class="export-btn" onclick="exportToExcel('visitsTable', 'زيارات_المزرعة')">📥 تصدير Excel</button>
    </div>
    <table id="visitsTable"></table>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>

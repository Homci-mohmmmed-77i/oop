<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة المزرعة الذكي</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sidebar">
  <h2>🚜 إدارة المزرعة</h2>
  <button onclick="showSection('animals')">🐄 الحيوانات</button>
  <button onclick="showSection('workers')">👨‍🌾 العمال</button>
  <button onclick="showSection('feeds')">🌾 الأعلاف</button>
  <button onclick="showSection('visits')">🩺 الزيارات البيطرية</button>
</div>

<div class="main">
  <section id="animals" class="section active">
    <h2>إدارة الحيوانات</h2>
    <div class="input-container card">
        <input id="a_type" placeholder="النوع">
        <input id="a_age" placeholder="العمر">
        <input id="a_health" placeholder="الحالة الصحية">
        <input id="a_code" placeholder="الرقم التعريفي (10 أرقام)">
        <button onclick="addAnimal()">➕ إضافة حيوان</button>
    </div>
    
    <div class="table-controls">
        <input type="text" id="searchAnimal" placeholder="🔍 ابحث بالنوع أو الكود..." oninput="searchTable('animals')">
        <button class="export-btn" onclick="exportToExcel('animalsTable', 'حيوانات_المزرعة')">📥 تصدير Excel</button>
    </div>
    <table id="animalsTable"></table>
  </section>

  <section id="workers" class="section">
    <h2>إدارة العمال</h2>
    <div class="input-container card">
        <input id="w_name" placeholder="الاسم">
        <input id="w_job" placeholder="الوظيفة">
        <input id="w_phone" placeholder="الهاتف">
        <button onclick="addWorker()">➕ إضافة عامل</button>
    </div>
    <div class="table-controls">
        <input type="text" id="searchWorker" placeholder="🔍 ابحث بالاسم..." oninput="searchTable('workers')">
    </div>
    <table id="workersTable"></table>
  </section>
  
  </div>

<script src="app.js"></script>
</body>
</html>

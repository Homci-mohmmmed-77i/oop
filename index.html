<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة مزرعة المواشي</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sidebar">
  <h2>🐄 المزرعة</h2>
  <button onclick="showSection('animals')">الحيوانات</button>
  <button onclick="showSection('workers')">العمال</button>
  <button onclick="showSection('feeds')">الأعلاف</button>
  <button onclick="showSection('visits')">الزيارات البيطرية</button>
</div>

<div class="main">
  <section id="animals" class="section active">
    <h2>إدارة الحيوانات</h2>
    <div class="input-group">
      <input id="a_type" placeholder="النوع">
      <input id="a_age" placeholder="العمر">
      <input id="a_health" placeholder="الحالة الصحية">
      <input id="a_code" placeholder="الرقم التعريفي">
      <button onclick="addAnimal()">إضافة / حفظ</button>
    </div>
    <table id="animalsTable"></table>
  </section>

  <section id="workers" class="section">
    <h2>إدارة العمال</h2>
    <div class="input-group">
      <input id="w_name" placeholder="الاسم">
      <input id="w_job" placeholder="الوظيفة">
      <input id="w_phone" placeholder="الهاتف">
      <button onclick="addWorker()">إضافة / حفظ</button>
    </div>
    <table id="workersTable"></table>
  </section>

  <section id="feeds" class="section">
    <h2>الأعلاف</h2>
    <div class="input-group">
      <input id="f_name" placeholder="اسم العلف">
      <input id="f_qty" placeholder="الكمية">
      <button onclick="addFeed()">إضافة / حفظ</button>
    </div>
    <table id="feedsTable"></table>
  </section>

  <section id="visits" class="section">
    <h2>الزيارات البيطرية</h2>
    <div class="input-group">
      <input id="v_vet" placeholder="اسم الطبيب">
      <input id="v_animal" placeholder="رقم الحيوان">
      <input id="v_date" type="date">
      <input id="v_diag" placeholder="التشخيص">
      <button onclick="addVisit()">إضافة / حفظ</button>
    </div>
    <table id="visitsTable"></table>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
